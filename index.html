<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>시현이의 사이트</title>

    <link rel="stylesheet" href="css/sytle.css">
    <style>
        /* 게임 섹션 스타일 */
        .game-section {
            text-align: center;
            margin: 40px auto;
            padding: 20px;
        }
        
        .game-container {
            display: inline-block;
            border: 5px solid #333;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            background: #000;
        }
        
        #game-canvas {
            display: block;
        }
        
        .game-title {
            color: #4CAF50;
            font-size: 28px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .game-description {
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .game-controls {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            display: inline-block;
        }
        
        .game-controls h4 {
            margin: 0 0 10px 0;
            color: #333;
        }
        
        .game-controls p {
            margin: 5px 0;
            font-size: 13px;
            color: #555;
        }
        
        .start-game-btn {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .start-game-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.4);
        }
        
        .start-game-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <header>
        <h1>엄청난 사이트</h1>
        <hr>
    </header>
    <main>

            <li>숨숨해서</li>
            <li>삼삼해서</li>
        </section>
    
        </ul>
        <br>
        <br>
        <br>
        <h2>버튼</h2>
